name: Refresh Market Caps

on:
  schedule:
    - cron: "17 6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          persist-credentials: true

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Refresh market-cap snapshot
        run: bun run market-cap:refresh

      - name: Validate generated artifacts
        run: bun run typecheck

      - name: Commit refreshed market-cap artifacts
        run: |
          if git diff --quiet -- src/lib/generated/market-cap-snapshots.ts public/data/market-cap-snapshots-latest.csv; then
            echo "No market-cap changes to commit."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/lib/generated/market-cap-snapshots.ts public/data/market-cap-snapshots-latest.csv
          git commit -m "chore: refresh market-cap snapshots"
          git push
