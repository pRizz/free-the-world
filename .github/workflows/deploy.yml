name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload-pages-artifact.outputs.artifact-id }}
    env:
      SITE_BASE_PATH: "/${{ github.event.repository.name }}/"
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate content
        run: bun run content:validate

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Build static site
        run: bun run build

      - name: Archive Pages artifact
        run: bash scripts/ci/archive-pages-artifact.sh .output/public "$RUNNER_TEMP/artifact.tar"

      - name: Upload Pages artifact
        id: upload-pages-artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Create Pages deployment
        id: deployment
        env:
          ARTIFACT_ID: ${{ needs.build.outputs.artifact-id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/create-pages-deployment.ts

      - name: Wait for Pages deployment
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/wait-for-pages-deployment.ts
