name: Deploy Website

on:
  push:
    branches:
      - main
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: free-the-world-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Validate content
        run: bun run content:validate

      - name: Typecheck
        run: bun run typecheck

      - name: Run unit tests
        run: bun run test

      - name: Install Playwright Chromium
        run: bunx playwright install --with-deps chromium

      - name: Run Playwright tests
        run: bun run test:e2e

      - name: Build deploy artifacts
        run: bun run deploy:build

      - name: Upload AWS artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-aws-site
          path: .artifacts/deploy/aws
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

      - name: Upload Pages artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-pages-site
          path: .artifacts/deploy/github-pages
          include-hidden-files: true
          retention-days: 1
          if-no-files-found: error

  aws:
    environment:
      name: production
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download AWS artifact
        uses: actions/download-artifact@v5
        with:
          name: deploy-aws-site
          path: .artifacts/deploy/aws

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: us-east-1
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}

      - name: Bootstrap AWS infrastructure
        run: bun run deploy:aws:bootstrap --apply

      - name: Publish AWS artifact
        run: bun run deploy:aws:publish --artifact=.artifacts/deploy/aws --apply

  pages:
    environment:
      name: github-pages
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Download Pages artifact
        uses: actions/download-artifact@v5
        with:
          name: deploy-pages-site
          path: .artifacts/deploy/github-pages

      - name: Plan Pages deployment
        id: pages_plan
        run: bun run deploy:pages:plan --artifact=.artifacts/deploy/github-pages

      - name: Archive Pages artifact
        if: steps.pages_plan.outputs.pages_changed == 'true'
        run: bash scripts/ci/archive-pages-artifact.sh .artifacts/deploy/github-pages "$RUNNER_TEMP/artifact.tar"

      - name: Upload Pages deployment artifact
        if: steps.pages_plan.outputs.pages_changed == 'true'
        id: upload_pages_artifact
        uses: actions/upload-artifact@v7
        with:
          name: github-pages
          path: ${{ runner.temp }}/artifact.tar
          retention-days: 1
          if-no-files-found: error

      - name: Create Pages deployment
        if: steps.pages_plan.outputs.pages_changed == 'true'
        id: deployment
        env:
          ARTIFACT_ID: ${{ steps.upload_pages_artifact.outputs.artifact-id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/create-pages-deployment.ts

      - name: Wait for Pages deployment
        if: steps.pages_plan.outputs.pages_changed == 'true'
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
          GITHUB_TOKEN: ${{ github.token }}
        run: bun run scripts/ci/wait-for-pages-deployment.ts

  verify:
    runs-on: ubuntu-latest
    needs:
      - aws
      - pages
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Verify production deployment
        run: bun run deploy:verify
