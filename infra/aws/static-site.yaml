AWSTemplateFormatVersion: "2010-09-09"
Description: Free The World static site hosting on CloudFront with a private S3 origin.

Parameters:
  SiteBucketName:
    Type: String
  PrimaryDomain:
    Type: String
  PrimaryHostedZoneId:
    Type: String
  SecondaryLiveDomainOne:
    Type: String
  SecondaryLiveHostedZoneIdOne:
    Type: String
  RedirectDomainOne:
    Type: String
  RedirectHostedZoneIdOne:
    Type: String
  RedirectDomainTwo:
    Type: String
  RedirectHostedZoneIdTwo:
    Type: String
  RedirectDomainThree:
    Type: String
  RedirectHostedZoneIdThree:
    Type: String
  RedirectDomainFour:
    Type: String
  RedirectHostedZoneIdFour:
    Type: String
  PriceClass:
    Type: String
    Default: PriceClass_100
    AllowedValues:
      - PriceClass_100
      - PriceClass_200
      - PriceClass_All

Resources:
  SiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Ref SiteBucketName
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  SiteOriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Description: !Sub ${AWS::StackName} private S3 access
        Name: !Sub ${AWS::StackName}-oac
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  SiteCertificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref PrimaryDomain
      SubjectAlternativeNames:
        - !Ref SecondaryLiveDomainOne
        - !Ref RedirectDomainOne
        - !Ref RedirectDomainTwo
        - !Ref RedirectDomainThree
        - !Ref RedirectDomainFour
      ValidationMethod: DNS
      DomainValidationOptions:
        - DomainName: !Ref PrimaryDomain
          HostedZoneId: !Ref PrimaryHostedZoneId
        - DomainName: !Ref SecondaryLiveDomainOne
          HostedZoneId: !Ref SecondaryLiveHostedZoneIdOne
        - DomainName: !Ref RedirectDomainOne
          HostedZoneId: !Ref RedirectHostedZoneIdOne
        - DomainName: !Ref RedirectDomainTwo
          HostedZoneId: !Ref RedirectHostedZoneIdTwo
        - DomainName: !Ref RedirectDomainThree
          HostedZoneId: !Ref RedirectHostedZoneIdThree
        - DomainName: !Ref RedirectDomainFour
          HostedZoneId: !Ref RedirectHostedZoneIdFour

  RequestRouterFunction:
    Type: AWS::CloudFront::Function
    Properties:
      Name: !Sub ${AWS::StackName}-request-router
      AutoPublish: true
      FunctionConfig:
        Comment: Host redirect plus pretty URL rewrites for Free The World.
        Runtime: cloudfront-js-2.0
      FunctionCode: !Sub |
        function serializeQuerystring(querystring) {
          if (!querystring) {
            return "";
          }

          var parts = [];
          for (var key in querystring) {
            if (!querystring.hasOwnProperty(key)) {
              continue;
            }

            var entry = querystring[key];
            if (entry && entry.multiValue) {
              for (var index = 0; index < entry.multiValue.length; index += 1) {
                var multiValue = entry.multiValue[index];
                parts.push(multiValue.value ? key + "=" + multiValue.value : key);
              }
              continue;
            }

            if (entry && entry.value) {
              parts.push(key + "=" + entry.value);
              continue;
            }

            parts.push(key);
          }

          return parts.join("&");
        }

        function listContains(list, value) {
          return list.indexOf(value) !== -1;
        }

        function handler(event) {
          var request = event.request;
          var headers = request.headers || {};
          var hostHeader = headers.host && headers.host.value ? headers.host.value.toLowerCase() : "";
          var primaryHost = "${PrimaryDomain}";
          var liveHosts = [
            primaryHost,
            "${SecondaryLiveDomainOne}"
          ];
          var redirectHosts = [
            "${RedirectDomainOne}",
            "${RedirectDomainTwo}",
            "${RedirectDomainThree}",
            "${RedirectDomainFour}"
          ];

          if (hostHeader && listContains(redirectHosts, hostHeader)) {
            var querystring = serializeQuerystring(request.querystring);
            var querySuffix = querystring ? "?" + querystring : "";

            return {
              statusCode: 301,
              statusDescription: "Moved Permanently",
              headers: {
                location: {
                  value: "https://" + primaryHost + request.uri + querySuffix
                },
                "cache-control": {
                  value: "public, max-age=3600"
                }
              }
            };
          }

          if (!request.uri || request.uri === "/") {
            request.uri = "/index.html";
            return request;
          }

          if (request.uri.endsWith("/")) {
            request.uri = request.uri + "index.html";
            return request;
          }

          var lastSegment = request.uri.substring(request.uri.lastIndexOf("/") + 1);
          if (lastSegment.indexOf(".") === -1) {
            request.uri = request.uri + "/index.html";
          }

          return request;
        }

  SiteDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Aliases:
          - !Ref PrimaryDomain
          - !Ref SecondaryLiveDomainOne
          - !Ref RedirectDomainOne
          - !Ref RedirectDomainTwo
          - !Ref RedirectDomainThree
          - !Ref RedirectDomainFour
        Comment: !Sub ${AWS::StackName} static site distribution
        CustomErrorResponses:
          - ErrorCode: 403
            ErrorCachingMinTTL: 60
            ResponseCode: 404
            ResponsePagePath: /404.html
          - ErrorCode: 404
            ErrorCachingMinTTL: 60
            ResponseCode: 404
            ResponsePagePath: /404.html
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachePolicyId: 658327ea-f89d-4fab-a63d-7e88639e58f6
          CachedMethods:
            - GET
            - HEAD
          Compress: true
          FunctionAssociations:
            - EventType: viewer-request
              FunctionARN: !GetAtt RequestRouterFunction.FunctionMetadata.FunctionARN
          TargetOriginId: site-s3-origin
          ViewerProtocolPolicy: redirect-to-https
        DefaultRootObject: index.html
        Enabled: true
        HttpVersion: http2and3
        IPV6Enabled: true
        Origins:
          - DomainName: !GetAtt SiteBucket.RegionalDomainName
            Id: site-s3-origin
            OriginAccessControlId: !GetAtt SiteOriginAccessControl.Id
            S3OriginConfig: {}
        PriceClass: !Ref PriceClass
        ViewerCertificate:
          AcmCertificateArn: !Ref SiteCertificate
          MinimumProtocolVersion: TLSv1.2_2021
          SslSupportMethod: sni-only

  SiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref SiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontRead
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub ${SiteBucket.Arn}/*
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub arn:${AWS::Partition}:cloudfront::${AWS::AccountId}:distribution/${SiteDistribution}

  PrimaryDomainARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrimaryHostedZoneId
      Name: !Ref PrimaryDomain
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  PrimaryDomainAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrimaryHostedZoneId
      Name: !Ref PrimaryDomain
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  SecondaryLiveDomainOneARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref SecondaryLiveHostedZoneIdOne
      Name: !Ref SecondaryLiveDomainOne
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  SecondaryLiveDomainOneAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref SecondaryLiveHostedZoneIdOne
      Name: !Ref SecondaryLiveDomainOne
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainOneARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdOne
      Name: !Ref RedirectDomainOne
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainOneAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdOne
      Name: !Ref RedirectDomainOne
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainTwoARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdTwo
      Name: !Ref RedirectDomainTwo
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainTwoAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdTwo
      Name: !Ref RedirectDomainTwo
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainThreeARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdThree
      Name: !Ref RedirectDomainThree
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainThreeAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdThree
      Name: !Ref RedirectDomainThree
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainFourARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdFour
      Name: !Ref RedirectDomainFour
      Type: A
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

  RedirectDomainFourAAAARecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref RedirectHostedZoneIdFour
      Name: !Ref RedirectDomainFour
      Type: AAAA
      AliasTarget:
        DNSName: !GetAtt SiteDistribution.DomainName
        HostedZoneId: Z2FDTNDATAQYW2

Outputs:
  SiteBucketName:
    Value: !Ref SiteBucket
  DistributionId:
    Value: !Ref SiteDistribution
  DistributionDomainName:
    Value: !GetAtt SiteDistribution.DomainName
  PrimaryOrigin:
    Value: !Sub https://${PrimaryDomain}
  SecondaryLiveOriginOne:
    Value: !Sub https://${SecondaryLiveDomainOne}
